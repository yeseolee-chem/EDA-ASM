# ASR initial-seed selection config (spec v1.1)

output_dir: data/selection/initial_seed_v1
force_overwrite: false

total_samples: 800
allocation_strategy: balanced
family_targets:
  e2: 250
  sn2: 250
  dipolar: 300

n_quartiles: 4
stratify_column: delta_Ea
quartile_remainder_policy: front_load

diversity_method: maximin_kennard_stone
feature_type: morgan
morgan_radius: 2
morgan_nbits: 2048
distance_metric: hamming

collapse_conformers: true
collapse_by: lowest_energy

min_within_cell_tanimoto_distance: 0.30
max_failure_rate: 0.10        # softened from 0.01: QMrxn20 XYZ→Mol conversion can fail more often
allow_quartile_collapse: false

random_seed: 42

data:
  qmrxn20_root: data/raw/QMrxn20
  dipolar_root: data/raw/dipolar_cycloaddition

qmrxn20:
  method: lccsd                # spec uses delta_Ea_lccsd; fallback to mp2/hf if lccsd missing
  reactant_kind: rcc           # prefer constrained reactant complex
  method_fallback: [lccsd, mp2, hf]
  charge: -1                   # E2/SN2 anionic systems (nucleophile/base + neutral substrate)

dipolar:
  energy_kind: E_sp
  charge: 0
