# ASR v1 — Backbone Comparison: MACE-OFF (medium) head training config.
# Mirrors configs/asr_v1.yaml with ONE change: feature_cache points at the
# MACE-OFF feature blob produced by cache_features_maceoff.py. Heads, CV
# folds, ensemble, optimizer hyperparameters and learning-curve grid are
# identical to the ep29 baseline so the comparison is controlled
# (ASR_Backbone_Comparison_Spec_v1.0 §5).

experiment_name: asr_v1_dipolar_poc_maceoff

# ---- Data (unchanged) ----
labels_parquet: ADF_250/adf_outputs/parsed/asr_labels.parquet
dipolar_root: data/raw/dipolar_cycloaddition/extracted/full_dataset_profiles
family: dipolar

# ---- Backbone (frozen, MACE-OFF23 medium) ----
# NB: cache_features_maceoff.py reads --model-size from the CLI, not from
# this block — the block is informational and shows up in summary.json.
backbone:
  kind: mace-off23
  model_size: medium
  default_dtype: float32
  num_layers: -1                # -1 = concat all interaction-block invariants

# ---- Feature cache (MACE-OFF) ----
feature_cache: outputs/asr_v1/features_dipolar_maceoff_medium.pt

# ---- Architectures (unchanged) ----
baseline_b0:
  d_hidden: 64
  head_hidden: 32
  dropout: 0.2

model_m1:
  d_model: 64
  n_heads: 2
  head_hidden: 32
  dropout: 0.2

# ---- Optimization (unchanged) ----
train:
  epochs: 300
  batch_size: 16
  lr: 1.0e-3
  weight_decay: 1.0e-3
  early_stop_patience: 30
  device: auto

# ---- Ensemble + CV (unchanged — must match ep29 for fold-seed parity) ----
ensemble:
  n_models: 5
  base_seed: 0

cv:
  n_folds: 5
  seed: 42

# ---- Learning curve (unchanged) ----
learning_curve_train_sizes: [32, 64, 96, 107]
