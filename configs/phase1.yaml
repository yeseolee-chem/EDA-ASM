# Phase 1 — Halo8 sampling and fragment definition
# This file documents the parameters baked into eda_asm.phase1; updating it
# without changing the code is informational only.

seed: 42

# Halo8 source DBs
halo8_db_dir: data/Halo8
halo8_db_files:
  - Halo_1.db
  - Halo_2.db
  - Halo_3.db
  - Halo_4.db
  - Halo_5.db
  - Halo_6.db
  - Halo_7.db
  - Halo_8.db
  - Halo_9.db
  - Halo_10.db

# Stratified sampling targets
sampling:
  total: 400
  per_source:
    T1x: 190
    Halo_F: 70
    Halo_Cl: 70
    Halo_Br: 70
  heavy_atoms: [5, 6, 7, 8]   # equal share each
  bond_change_bins:
    "2-3": 0.6
    "4-6": 0.4
  ea_tertile_ratios: [0.333, 0.333, 0.333]
  min_frames: 20

# Bond detection (Cordero 2008 covalent radii; see eda_asm/phase1/bonds.py)
bond_detection:
  default_tolerance: 1.3
  halogen_tolerance: 1.4

# 5-point IRC sampling
five_points:
  zeta_grid: [0.0, 0.25, 0.5, 0.75, 1.0]
  arc_length_metric: frame_to_frame_rmsd

# Case classification
classification:
  case_A: "n_components_R >= 2"
  case_B: "n_components_R == 1 AND n_bond_changes in [2, 3]"
  case_C: "n_components_R == 1 AND n_bond_changes >= 4"
  case_C_strategy: manual   # or "exclude" (option 2)

# Fragment confidence thresholds
fragment_review:
  auto_accept_threshold: 0.8
  manual_review_threshold: 0.5
