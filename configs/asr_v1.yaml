# ASR v1 — Dipolar POC head training config
# Hyperparameters track ASR_Revised_Plan_v2_DipolarPOC §5.2 (small-data override).

experiment_name: asr_v1_dipolar_poc

# ---- Data ----
labels_parquet: ADF_250/adf_outputs/parsed/asr_labels.parquet
dipolar_root: data/raw/dipolar_cycloaddition/extracted/full_dataset_profiles
family: dipolar                    # qmrxn20_e2 is OOD in Phase 1

# ---- Backbone (frozen) ----
backbone:
  config: NequIP/output/halo8_nequip_v1/training_run/config.yaml
  checkpoint: NequIP/output/halo8_nequip_v1/training_run/best_model.pth

# ---- Feature cache ----
feature_cache: outputs/asr_v1/features_dipolar_ep29.pt

# ---- Architectures ----
baseline_b0:
  d_hidden: 64
  head_hidden: 32
  dropout: 0.2

model_m1:
  d_model: 64
  n_heads: 2
  head_hidden: 32
  dropout: 0.2

# ---- Optimization (Plan §5.2) ----
train:
  epochs: 300
  batch_size: 16
  lr: 1.0e-3
  weight_decay: 1.0e-3
  early_stop_patience: 30
  device: auto                     # cuda if available else cpu

# ---- Ensemble + CV (Plan §5.3) ----
ensemble:
  n_models: 5
  base_seed: 0

cv:
  n_folds: 5
  seed: 42

# ---- Learning curve (Plan §5.4) ----
# Capped at the train-fold size (= ceil(N × (K-1)/K)) at runtime;
# anything over is auto-clamped and de-duplicated by learning_curve.py.
# Expanded grid for the post-retry rerun (expected N ≈ 250-290 dipolar).
learning_curve_train_sizes: [32, 64, 96, 128, 160, 192, 224]
