# ASR v1 — MACE-OFF LARGE head training @ N=250 (2026-06-04).
# Identical to asr_v1_maceoff_n250.yaml except model size: large instead of
# medium. Tests whether the medium→large backbone capacity bump moves the
# 9.4 kcal/mol overall MAE that medium hit on the same N=250 dipolar set.
# Decision criterion (post-run): adopt large only if overall MAE improves by
# >0.5 kcal/mol AND the hard channels (Pauli, E_orb) drop measurably.

experiment_name: asr_v1_dipolar_poc_maceoff_large_n250

# ---- Data ----
labels_parquet: ADF_250/adf_outputs/parsed/asr_labels.parquet
dipolar_root: data/raw/dipolar_cycloaddition/extracted/full_dataset_profiles
family: dipolar

# ---- Backbone (frozen MACE-OFF23 large) ----
backbone:
  kind: mace-off23
  model_size: large
  default_dtype: float32
  num_layers: -1

# ---- Feature cache ----
feature_cache: outputs/asr_v1/features_dipolar_maceoff_large_n250.pt

# ---- Architectures (unchanged) ----
baseline_b0:
  d_hidden: 64
  head_hidden: 32
  dropout: 0.2

model_m1:
  d_model: 64
  n_heads: 2
  head_hidden: 32
  dropout: 0.2

# ---- Optimization ----
train:
  epochs: 300
  batch_size: 16
  lr: 1.0e-3
  weight_decay: 1.0e-3
  early_stop_patience: 30
  device: auto

# ---- Ensemble + CV (matches medium n250 for fold parity) ----
ensemble:
  n_models: 5
  base_seed: 0

cv:
  n_folds: 5
  seed: 42

# ---- Learning curve ----
learning_curve_train_sizes: [32, 64, 96, 128, 160, 200]
