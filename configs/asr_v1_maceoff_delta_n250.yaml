# ASR v1 — MACE-OFF medium @ N=250 with Δ-learning over a 6-descriptor
# physics ridge baseline. The ML head learns the residual
#   y - (β·d + intercept).
# Folds, ensemble, optimizer match asr_v1_maceoff_n250.yaml so the 9.41
# kcal/mol R/P baseline at N=250 is a direct comparison.

experiment_name: asr_v1_dipolar_poc_maceoff_delta_n250

# ---- Data ----
labels_parquet: ADF_250/adf_outputs/parsed/asr_labels.parquet
dipolar_root: data/raw/dipolar_cycloaddition/extracted/full_dataset_profiles
family: dipolar

# ---- Backbone (frozen MACE-OFF23 medium, RTSP inputs) ----
backbone:
  kind: mace-off23
  model_size: medium
  default_dtype: float32
  num_layers: -1

# ---- Feature cache (RTSP + descriptors) ----
feature_cache: outputs/asr_v1/features_dipolar_maceoff_medium_delta_n250.pt

# ---- Architectures ----
baseline_b0:
  d_hidden: 64
  head_hidden: 32
  dropout: 0.2

model_m1:
  d_model: 64
  n_heads: 2
  head_hidden: 32
  dropout: 0.2

# ---- Optimization ----
train:
  epochs: 300
  batch_size: 16
  lr: 1.0e-3
  weight_decay: 1.0e-3
  early_stop_patience: 30
  device: auto

# ---- Δ-learning baseline ----
delta_baseline:
  ridge_alpha: 1.0   # Ridge λ for the linear physics baseline

# ---- Ensemble + CV (parity with n250 R/P run) ----
ensemble:
  n_models: 5
  base_seed: 0

cv:
  n_folds: 5
  seed: 42

# ---- Learning curve ----
learning_curve_train_sizes: [32, 64, 96, 128, 160, 200]
