# Fragment partitioning config (ASR_Fragment_Partitioning_Spec_v1.0.md)
spec_version: "1.0"
output_dir: data/fragments/v1
force_overwrite: false

method_order:
  - smarts
  - d2af
  - manual_override

smarts:
  sn2_e2_anion_patterns:
    - "[H-;X0]"
    - "[F-;X0]"
    - "[Cl-;X0]"
    - "[Br-;X0]"
    - "[I-;X0]"
    - "[O-;X0]"
    - "[S-;X0]"
    - "[N-;X0]"
  stuyver_dipole_position: first   # spec default; verify per row by SMILES catalog

d2af:
  bond_detection_tolerance: 0.30
  max_components_to_merge: 4

validation:
  min_interfragment_dist_ts_warn_upper: 3.5
  min_interfragment_dist_ts_warn_lower: 1.0
  enforce_charge_conservation: true
  enforce_no_bond_crossing: true
  enforce_hydrogen_with_parent_heavy: true

family_sanity:
  sn2_expected_anion_size: 1
  e2_expected_anion_size: 1
  dipolar_dipole_size_range: [3, 30]
  dipolar_dipolarophile_size_range: [2, 30]

failure_limits:
  max_failure_rate: 0.05      # spec §12: abort if > 5 % fail

reproducibility:
  random_seed: 42

io:
  parquet_compression: zstd

inputs:
  seed_csv: data/selection/initial_seed_v1/selected_reactions.csv
  qmrxn20_root: data/raw/QMrxn20
  dipolar_root: data/raw/dipolar_cycloaddition
