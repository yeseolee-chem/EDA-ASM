{% extends "_base.html" %}
{% block title %}Stage 5-A Review — Dashboard{% endblock %}
{% block content %}
<section class="progress-panel">
  <h2>Stage 5-A Fragmentation Review (400 reactions)</h2>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">Loading…</div>
  <div id="progress-tiles"></div>
</section>

<section class="quick-actions">
  <button id="btn-next">Next unreviewed</button>
  <button id="btn-random">Random unreviewed</button>
  <a class="btn-link" href="/phase1_5">Old Phase 1.5 dashboard</a>
</section>

<section class="filters">
  <h3>Filter</h3>
  <label>Status:
    <select id="f-status" multiple size="6">
      <option value="not_reviewed" selected>not_reviewed</option>
      <option value="accepted">accepted</option>
      <option value="modified">modified</option>
      <option value="rejected">rejected</option>
    </select>
  </label>
  <label>Pattern:
    <select id="f-pattern" multiple size="7">
      <option value="P0_BIMOL" selected>P0_BIMOL</option>
      <option value="P1_OPEN" selected>P1_OPEN</option>
      <option value="P2_CLOSED" selected>P2_CLOSED</option>
      <option value="P3_TETHER" selected>P3_TETHER</option>
      <option value="P4_DISSOC" selected>P4_DISSOC</option>
      <option value="P5_HSHIFT" selected>P5_HSHIFT</option>
    </select>
  </label>
  <label>Source:
    <select id="f-source" multiple size="4">
      <option value="T1x" selected>T1x</option>
      <option value="Halo_F" selected>Halo_F</option>
      <option value="Halo_Cl" selected>Halo_Cl</option>
      <option value="Halo_Br" selected>Halo_Br</option>
    </select>
  </label>
  <label>Bookmarked only:
    <input type="checkbox" id="f-bookmark">
  </label>
  <label>Previously modified only:
    <input type="checkbox" id="f-prevmod">
  </label>
  <button id="apply-filters">Apply</button>
</section>

<section class="reactions">
  <h3>Reactions</h3>
  <table id="rxn-table">
    <thead>
      <tr>
        <th>ID</th><th>Source</th><th>Pattern</th><th>#frag</th>
        <th>n_atoms</th><th>Δbonds</th><th>Confidence</th><th>Ea (eV)</th>
        <th>Status</th><th>Bookmark</th><th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="paging"></div>
</section>

<script>
let __state = null;
let __filtered = [];
let __pageSize = 50;
let __page = 0;

const PATTERN_COLOUR = {
  P0_BIMOL: '#9467bd',
  P1_OPEN: '#e377c2',
  P2_CLOSED: '#1f77b4',
  P3_TETHER: '#2ca02c',
  P4_DISSOC: '#17becf',
  P5_HSHIFT: '#ff7f0e',
};

function fmtConf(c) {
  if (c === null || c === undefined) return '–';
  return c.toFixed(2);
}

async function loadState() {
  const r = await fetch('/api/stage5a/state');
  __state = await r.json();
  applyFilters();
  renderProgress();
}

function applyFilters() {
  const sel = (id) => Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
  const statuses = new Set(sel('f-status'));
  const patterns = new Set(sel('f-pattern'));
  const sources = new Set(sel('f-source'));
  const bookmarkOnly = document.getElementById('f-bookmark').checked;
  const prevModOnly = document.getElementById('f-prevmod').checked;

  __filtered = __state.reactions.filter(r => {
    if (!statuses.has(r.review_status)) return false;
    if (!patterns.has(r.pattern)) return false;
    if (!sources.has(r.source)) return false;
    if (bookmarkOnly && !r.bookmarked) return false;
    if (prevModOnly && !r.previously_modified) return false;
    return true;
  });
  __page = 0;
  renderTable();
}

function renderProgress() {
  const p = __state.progress;
  document.getElementById('progress-text').textContent =
    `${p.reviewed} / ${p.total} reviewed   (${p.bookmarks} bookmarked)`;
  const pct = p.total === 0 ? 0 : 100 * p.reviewed / p.total;
  document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';

  const tiles = document.getElementById('progress-tiles');
  tiles.innerHTML = '';
  Object.entries(p.by_pattern).forEach(([pat, v]) => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.style.borderLeftColor = PATTERN_COLOUR[pat] || '#333';
    div.innerHTML = `<strong>${pat}</strong>: ${v.reviewed} / ${v.total}`;
    tiles.appendChild(div);
  });
}

function renderTable() {
  const tbody = document.querySelector('#rxn-table tbody');
  tbody.innerHTML = '';
  const start = __page * __pageSize;
  const end = Math.min(__filtered.length, start + __pageSize);
  for (let i = start; i < end; i++) {
    const r = __filtered[i];
    const tr = document.createElement('tr');
    const colour = PATTERN_COLOUR[r.pattern] || '#333';
    const prevModBadge = r.previously_modified ? ' <span title="previously modified" style="color:#b45309;font-weight:bold">✎</span>' : '';
    tr.innerHTML = `
      <td><a href="/stage5a/${r.rxn_id}">${r.rxn_id}</a>${prevModBadge}</td>
      <td>${r.source}</td>
      <td><span class="pattern-pill" style="background:${colour}">${r.pattern}</span></td>
      <td>${r.n_fragments}</td>
      <td>${r.n_atoms}</td>
      <td>${r.n_bond_changes}</td>
      <td>${fmtConf(r.confidence)}</td>
      <td>${r.activation_energy.toFixed(2)}</td>
      <td>${r.review_status}</td>
      <td>${r.bookmarked ? '★' : ''}</td>
      <td><a href="/stage5a/${r.rxn_id}">Open →</a></td>
    `;
    tbody.appendChild(tr);
  }
  // paging
  const paging = document.getElementById('paging');
  const npages = Math.ceil(__filtered.length / __pageSize);
  paging.innerHTML = '';
  for (let p = 0; p < npages; p++) {
    const btn = document.createElement('button');
    btn.textContent = p + 1;
    if (p === __page) btn.classList.add('active');
    btn.addEventListener('click', () => { __page = p; renderTable(); });
    paging.appendChild(btn);
  }
  paging.appendChild(document.createTextNode(` ${__filtered.length} reactions`));
}

document.getElementById('apply-filters').addEventListener('click', applyFilters);

document.getElementById('btn-next').addEventListener('click', () => {
  const next = (__state.reactions || []).find(r =>
    r.review_status === 'not_reviewed' && !r.bookmarked);
  if (next) location.href = '/stage5a/' + next.rxn_id;
  else alert('All non-bookmarked reactions reviewed. Filter "Bookmarked only" to revisit them.');
});
document.getElementById('btn-random').addEventListener('click', () => {
  const pool = (__state.reactions || []).filter(r =>
    r.review_status === 'not_reviewed' && !r.bookmarked);
  if (!pool.length) {
    alert('All non-bookmarked reactions reviewed. Filter "Bookmarked only" to revisit them.');
    return;
  }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  location.href = '/stage5a/' + pick.rxn_id;
});

loadState();
</script>

<style>
.btn-link { display: inline-block; padding: 6px 12px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; }
.pattern-pill { color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
.tile { display: inline-block; padding: 6px 12px; margin: 4px; border-left: 4px solid #333; background: #f7f7f7; }
</style>
{% endblock %}
