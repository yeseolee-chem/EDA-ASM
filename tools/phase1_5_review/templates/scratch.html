{% extends "review.html" %}
{% block title %}{{ rxn_id }} (scratch) — Phase 1.5 Review{% endblock %}
{% block content %}
{{ super() }}
<script>
// Scratch mode: kick off in Modify so the reviewer must place every atom.
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.querySelector('input[value="modified"]').click();
    document.getElementById('rx-rationale').setAttribute('placeholder',
      'Detailed rationale required for scratch mode (≥50 chars).');
  }, 200);
});
</script>
{% endblock %}
