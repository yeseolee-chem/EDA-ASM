{% extends "_base.html" %}
{% block title %}Dashboard — Phase 1.5 Review{% endblock %}
{% block content %}
<section class="progress-panel">
  <h2>Progress</h2>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">Loading…</div>
  <div id="progress-tiles"></div>
</section>

<section class="quick-actions">
  <button id="btn-next">Next unreviewed</button>
  <button id="btn-resume">Resume from last</button>
  <button id="btn-random">Random unreviewed</button>
  <button id="btn-export">Export current state</button>
</section>

<section class="filters">
  <h3>Filter</h3>
  <label>Status:
    <select id="f-status" multiple size="6">
      <option value="not_reviewed" selected>not_reviewed</option>
      <option value="accepted">accepted</option>
      <option value="modified">modified</option>
      <option value="rejected">rejected</option>
    </select>
  </label>
  <label>Case:
    <select id="f-case" multiple size="3">
      <option value="A" selected>A</option>
      <option value="B" selected>B</option>
      <option value="C" selected>C</option>
    </select>
  </label>
  <label>Source:
    <select id="f-source" multiple size="4">
      <option value="T1x" selected>T1x</option>
      <option value="Halo_F" selected>Halo_F</option>
      <option value="Halo_Cl" selected>Halo_Cl</option>
      <option value="Halo_Br" selected>Halo_Br</option>
    </select>
  </label>
  <label>Bookmarked only:
    <input type="checkbox" id="f-bookmark">
  </label>
  <button id="apply-filters">Apply</button>
</section>

<section class="reactions">
  <h3>Reactions</h3>
  <table id="rxn-table">
    <thead>
      <tr>
        <th>ID</th><th>Source</th><th>Case</th><th>Heavy</th>
        <th>Confidence</th><th>Status</th><th>Bookmark</th><th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="paging"></div>
</section>

<script>
let __state = null;
let __filtered = [];
let __pageSize = 50;
let __page = 0;

function fmtConf(c) {
  if (c === null || c === undefined) return '–';
  return c.toFixed(2);
}

async function loadState() {
  const r = await fetch('/api/state');
  __state = await r.json();
  applyFilters();
  renderProgress();
}

function applyFilters() {
  const sel = (id) => Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
  const statuses = new Set(sel('f-status'));
  const cases = new Set(sel('f-case'));
  const sources = new Set(sel('f-source'));
  const onlyBookmark = document.getElementById('f-bookmark').checked;
  __filtered = __state.reactions.filter(r => {
    if (!statuses.has(r.review_status)) return false;
    if (!cases.has(r.case)) return false;
    if (!sources.has(r.source)) return false;
    if (onlyBookmark && !r.bookmarked) return false;
    return true;
  });
  __page = 0;
  renderTable();
}

function renderProgress() {
  const p = __state.progress;
  const pct = p.total === 0 ? 0 : (p.reviewed * 100 / p.total);
  document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';
  document.getElementById('progress-text').textContent =
    `${p.reviewed} / ${p.total} reviewed (${pct.toFixed(1)}%)`;
  const tiles = document.getElementById('progress-tiles');
  tiles.innerHTML = '';
  for (const k of ['not_reviewed', 'accepted', 'modified', 'rejected']) {
    const v = p.by_status[k] || 0;
    const div = document.createElement('div');
    div.className = 'tile tile-' + k;
    div.innerHTML = `<span class="num">${v}</span><span class="lbl">${k}</span>`;
    tiles.appendChild(div);
  }
  for (const c of ['A', 'B', 'C']) {
    const cb = p.by_case[c];
    const div = document.createElement('div');
    div.className = 'tile tile-case';
    div.innerHTML = `<span class="num">${cb.reviewed}/${cb.total}</span><span class="lbl">Case ${c}</span>`;
    tiles.appendChild(div);
  }
}

function renderTable() {
  const tbody = document.querySelector('#rxn-table tbody');
  tbody.innerHTML = '';
  const start = __page * __pageSize;
  const slice = __filtered.slice(start, start + __pageSize);
  for (const r of slice) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><a href="/reaction/${r.rxn_id}">${r.rxn_id}</a></td>
      <td>${r.source}</td>
      <td>${r.case}</td>
      <td>${r.n_heavy_atoms}</td>
      <td>${fmtConf(r.auto_confidence)}</td>
      <td><span class="status status-${r.review_status}">${r.review_status}</span></td>
      <td>${r.bookmarked ? '★' : ''}</td>
      <td><a class="btn-mini" href="/reaction/${r.rxn_id}">Open</a></td>
    `;
    tbody.appendChild(tr);
  }
  const paging = document.getElementById('paging');
  const totalPages = Math.max(1, Math.ceil(__filtered.length / __pageSize));
  paging.innerHTML = `
    <button onclick="setPage(${__page-1})" ${__page <= 0 ? 'disabled' : ''}>Prev</button>
    page ${__page+1}/${totalPages} (${__filtered.length} rows)
    <button onclick="setPage(${__page+1})" ${__page >= totalPages-1 ? 'disabled' : ''}>Next</button>
  `;
}
function setPage(p) { __page = p; renderTable(); }

document.getElementById('apply-filters').addEventListener('click', applyFilters);
['f-status', 'f-case', 'f-source', 'f-bookmark'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

document.getElementById('btn-next').addEventListener('click', () => {
  // Skip both already-decided AND bookmarked reactions; bookmarks are
  // revisited via the "Bookmarked only" filter.
  const next = __state.reactions.find(
    r => r.review_status === 'not_reviewed' && !r.bookmarked
  );
  if (next) location.href = '/reaction/' + next.rxn_id;
  else alert('All non-bookmarked reactions reviewed.');
});
document.getElementById('btn-random').addEventListener('click', () => {
  const pool = __state.reactions.filter(
    r => r.review_status === 'not_reviewed' && !r.bookmarked
  );
  if (!pool.length) { alert('All non-bookmarked reactions reviewed.'); return; }
  const r = pool[Math.floor(Math.random() * pool.length)];
  location.href = '/reaction/' + r.rxn_id;
});
document.getElementById('btn-resume').addEventListener('click', () => {
  const recent = [...__state.reactions]
    .filter(r => r.review_completed_at)
    .sort((a, b) => (b.review_completed_at || '').localeCompare(a.review_completed_at || ''));
  if (!recent.length) { alert('No reviews yet.'); return; }
  location.href = '/reaction/' + recent[0].rxn_id;
});
document.getElementById('btn-export').addEventListener('click', async () => {
  const r = await fetch('/api/export', {method: 'POST'});
  const j = await r.json();
  alert('Exported.\n' + JSON.stringify(j, null, 2));
});

loadState();
</script>
{% endblock %}
