# ASR ADF Computation Spec v1.0 — configuration
spec_version: "1.0"

input:
  fragments_parquet: data/fragments/v1/fragments.parquet
  seed_csv: data/selection/initial_seed_v1/selected_reactions.csv

output:
  adf_root: adf_outputs
  batch_size: 100      # 8 batches × 100 = 800

adf_protocol:
  functional: BLYP            # GGA functional, dispersion separable in EDA
  dispersion: "GRIMME3 BJDAMP"
  basis: TZ2P
  core: None
  symmetry: NOSYM
  numerical_quality: Normal
  relativity: None            # main-group, light elements

geometry:
  reoptimize_ts: false        # use dataset TS as-is
  fragment_opt_convergence:
    energy: 1.0e-5
    gradients: 1.0e-4
    max_iterations: 200

workflow:
  prefer_pyfrag: false        # manual C1-C5 inputs (PyFrag absent on this cluster)
  separate_slurm_jobs: false  # run all C1-C5 inside one run_reaction.sh
  in_one_job_layout: "C4+C5 backgrounded; C1,C2 sequential; C3 after C1+C2"

cluster:
  exec_mode: "gate1_bash"     # license is gate1-only; we use xargs -P N on gate1
  ams_home: /home1/yeseo1ee/ams2026.103
  default_ncores: 1           # NSCM=1 per reaction (matches ADF_500 / V1 pattern)
  default_walltime: "12:00:00"
  retry_max: 2
  retry_walltime_multiplier: 2
  scf_retry_iterations: 500

reproducibility:
  hartree_to_kcal: 627.5094740631
