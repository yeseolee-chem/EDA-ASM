<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ASR validation — 62 FAIL reactions</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161922; --panel2: #1d2230; --line: #2b3142;
    --txt: #d6dae6; --dim: #8a93a6; --accent: #4ea1ff; --good: #5ed27a;
    --warn: #f0b94c; --bad: #ef5b5b; --halo: #a37bff; --t1x: #2bcdb0;
    --kept: #6b7385; --broken: #ef5b5b; --formed: #5ed27a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font: 13px/1.45 -apple-system, BlinkMacSystemFont,
      "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--txt); overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 24px; padding: 12px 20px;
    background: var(--panel); border-bottom: 1px solid var(--line); height: 50px;
  }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  .stat { font-size: 12px; color: var(--dim); }
  .stat b { color: var(--txt); font-weight: 600; }
  .controls { display: flex; gap: 10px; margin-left: auto; }
  .controls select, .controls input {
    background: var(--panel2); color: var(--txt); border: 1px solid var(--line);
    padding: 5px 8px; border-radius: 4px; font: inherit;
  }
  main {
    display: grid; grid-template-columns: 360px 1fr;
    gap: 1px; background: var(--line); height: calc(100vh - 50px);
  }
  #list { background: var(--bg); overflow-y: auto; padding: 8px; }
  #detail { background: var(--bg); overflow-y: auto; padding: 16px 22px; }
  .row {
    padding: 8px 10px; margin-bottom: 5px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; cursor: pointer;
    transition: background 80ms;
  }
  .row:hover { background: var(--panel2); }
  .row.selected { border-color: var(--accent); background: var(--panel2); }
  .row .top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .row .rid { font-family: "SF Mono", Consolas, Monaco, monospace;
    font-size: 11px; color: var(--txt); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge.t1x { background: rgba(43,205,176,0.18); color: var(--t1x); }
  .badge.halogen { background: rgba(163,123,255,0.18); color: var(--halo); }
  .badge.pattern { background: rgba(78,161,255,0.15); color: var(--accent); }
  .badge.fixable { background: rgba(94,210,122,0.18); color: var(--good); }
  .badge.intrinsic { background: rgba(138,147,166,0.15); color: var(--dim); }
  .badge.improved { background: rgba(94,210,122,0.20); color: var(--good); }
  .badge.pending { background: rgba(240,185,76,0.20); color: var(--warn); }
  .badge.stillfail { background: rgba(239,91,91,0.20); color: var(--bad);
    border: 1px solid rgba(239,91,91,0.4); font-weight: 700; }
  .badge.failcat { background: rgba(239,91,91,0.10); color: var(--bad);
    font-family: monospace; }
  .row .stats { display: flex; gap: 10px; margin-top: 4px; font-size: 10px;
    color: var(--dim); }
  .row .stats b { color: var(--txt); font-weight: 600; }
  .row .res-old { color: var(--bad); }
  .row .res-new { color: var(--good); }
  #detail h2 { margin: 0 0 4px 0; font-size: 16px; font-family: monospace; }
  #detail .meta { color: var(--dim); font-size: 12px; margin-bottom: 12px; }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 12px 14px; margin-bottom: 12px;
  }
  .panel h3 { margin: 0 0 8px 0; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); }
  .twocol { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .table { width: 100%; border-collapse: collapse; font-size: 12px;
    font-family: "SF Mono", monospace; }
  .table th, .table td { padding: 4px 6px; text-align: right;
    border-bottom: 1px solid var(--line); }
  .table th { font-weight: 600; color: var(--dim); }
  .table td:first-child, .table th:first-child { text-align: left; }
  .pos { color: var(--good); }
  .neg { color: var(--bad); }

  /* 3D viewer */
  .viewer-wrap {
    display: grid; grid-template-columns: 1fr 240px; gap: 12px;
    background: #0a0c12; border-radius: 6px; padding: 10px;
    border: 1px solid var(--line);
  }
  .viewer-canvas-wrap {
    position: relative; background: #060810; border-radius: 6px;
    overflow: hidden;
  }
  canvas.molcanvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas.molcanvas:active { cursor: grabbing; }
  .viewer-overlay {
    position: absolute; top: 8px; left: 10px; font-size: 11px;
    color: var(--dim); pointer-events: none; font-family: monospace;
  }
  .viewer-overlay .lbl { color: var(--txt); }
  .hover-info {
    position: absolute; pointer-events: none; background: #000a;
    color: var(--txt); padding: 5px 8px; border-radius: 4px;
    font-family: monospace; font-size: 11px; border: 1px solid var(--line);
    display: none;
  }
  .viewer-controls {
    display: flex; flex-direction: column; gap: 14px;
    padding: 6px 4px; font-size: 12px;
  }
  .vc-group { display: flex; flex-direction: column; gap: 5px; }
  .vc-group label { color: var(--dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.4px; }
  .vc-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .vc-btn {
    background: var(--panel2); color: var(--dim); border: 1px solid var(--line);
    padding: 4px 9px; border-radius: 4px; cursor: pointer; font-size: 11px;
    font-family: inherit;
  }
  .vc-btn:hover { background: var(--line); color: var(--txt); }
  .vc-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .vc-slider { width: 100%; }
  .frame-tick { display: flex; justify-content: space-between;
    color: var(--dim); font-size: 10px; margin-top: 2px; }
  .frag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .frag-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px; background: var(--panel2); border-radius: 4px;
    font-family: monospace; font-size: 11px; cursor: pointer;
    border: 1px solid transparent;
  }
  .frag-chip:hover { border-color: var(--line); }
  .frag-chip.muted { opacity: 0.3; }
  .frag-chip .dot {
    display: inline-block; width: 11px; height: 11px;
    border-radius: 50%;
  }
  .legend-bar { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px;
    color: var(--dim); margin-top: 8px; }
  .legend-bar span { display: inline-flex; align-items: center; gap: 5px; }
  .legend-bar .swatch {
    display: inline-block; width: 14px; height: 3px;
  }
  .legend-bar .swatch.dashed {
    background-image: repeating-linear-gradient(90deg,
      currentColor 0 4px, transparent 4px 7px);
    height: 3px;
  }
  .placeholder { padding: 40px; color: var(--dim); text-align: center; }
  details summary { cursor: pointer; font-size: 11px; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 0; }
  details[open] summary { color: var(--txt); }
  /* ── Editor ── */
  .edit-banner {
    background: rgba(78,161,255,0.12); border: 1px solid var(--accent);
    color: var(--accent); padding: 8px 12px; border-radius: 5px;
    font-size: 12px; margin: 8px 0;
  }
  .edit-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .edit-toolbar .vc-btn { padding: 5px 10px; }
  .edit-frag-rows { display: flex; flex-direction: column; gap: 6px;
    margin-top: 8px; }
  .edit-frag-row {
    display: grid; grid-template-columns: 22px 1fr 70px 30px;
    align-items: center; gap: 6px; padding: 6px 8px;
    background: var(--panel2); border-radius: 5px; font-size: 12px;
    border: 1px solid transparent;
  }
  .edit-frag-row.active { border-color: var(--accent); }
  .edit-frag-row .swatch {
    width: 14px; height: 14px; border-radius: 50%;
  }
  .edit-frag-row input, .edit-frag-row select {
    background: var(--bg); color: var(--txt); border: 1px solid var(--line);
    padding: 3px 6px; border-radius: 3px; font: inherit;
  }
  .edit-frag-row .atoms {
    font-family: monospace; color: var(--dim); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .edit-frag-row.unassigned { background: rgba(239,91,91,0.08);
    border-color: rgba(239,91,91,0.3); }
  .edit-warnings { margin-top: 8px; font-size: 11px; color: var(--warn); }
  .edit-status { font-size: 11px; color: var(--dim); margin-top: 8px;
    font-family: monospace; white-space: pre-wrap; }
  .edit-status.ok { color: var(--good); }
  .edit-status.err { color: var(--bad); }
  .save-btn {
    background: var(--accent); color: white; border: none;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font: inherit;
  }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .rerun-btn {
    background: var(--good); color: #0a1a10; border: none;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font: inherit;
    font-weight: 600;
  }
  .rerun-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>ASR validation · 62 FAIL reactions</h1>
  <span class="stat">total <b id="s-total">0</b></span>
  <span class="stat">alt available <b id="s-alt">0</b></span>
  <span class="stat">rerun done <b id="s-done">0</b></span>
  <span class="stat">improved <b id="s-improved">0</b></span>
  <span class="stat">unfixable <b id="s-unfix">0</b></span>
  <span class="stat" style="color: var(--bad)">still-FAIL <b id="s-stillfail">0</b></span>
  <div class="controls">
    <input id="search" placeholder="search rid…" type="search">
    <select id="filter-family">
      <option value="">all families</option>
      <option value="T1x">T1x</option>
      <option value="Halogen">Halogen</option>
    </select>
    <select id="filter-pattern">
      <option value="">all patterns</option>
    </select>
    <select id="filter-status">
      <option value="">all</option>
      <option value="stillfail">★ still FAIL only</option>
      <option value="alt">alt available</option>
      <option value="done">rerun done</option>
      <option value="improved">improved</option>
      <option value="unfix">unfixable</option>
    </select>
    <select id="filter-failcat">
      <option value="">all fail categories</option>
      <option value="schema">schema corruption</option>
      <option value="ts_not_max">ts_not_max</option>
      <option value="barrier">barrier_nonpositive</option>
      <option value="cons_huge">cons_huge (>50)</option>
      <option value="cons_mid">cons_mid (5–50)</option>
      <option value="cons_small">cons_small (0.5–5)</option>
    </select>
  </div>
</header>
<main>
  <section id="list"></section>
  <section id="detail"><div class="placeholder">select a reaction →</div></section>
</main>

<script>
"use strict";
// Surface every JS error in the body so they're visible without devtools.
window.addEventListener("error", e => {
  const div = document.createElement("div");
  div.style.cssText = "position:fixed;bottom:8px;left:8px;right:8px;background:#400;color:#fff;padding:10px;font:12px monospace;border-radius:4px;z-index:9999;white-space:pre-wrap";
  div.textContent = "JS ERROR: " + (e.message || e.error) + "\n  at " + (e.filename || "?") + ":" + (e.lineno || "?") + ":" + (e.colno || "?");
  document.body && document.body.appendChild(div);
});
window.addEventListener("unhandledrejection", e => {
  const div = document.createElement("div");
  div.style.cssText = "position:fixed;bottom:8px;left:8px;right:8px;background:#400;color:#fff;padding:10px;font:12px monospace;border-radius:4px;z-index:9999;white-space:pre-wrap";
  div.textContent = "PROMISE REJECTION: " + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
  document.body && document.body.appendChild(div);
});

const FMT = (x, d=3) => (x == null || x === "" || Number.isNaN(x)) ? "—" : Number(x).toFixed(d);

// CPK-ish element colors + covalent radii (Å, scaled for display).
const ELEM = {
  H:  { c: "#e8e8e8", r: 0.31, z: 1 },
  B:  { c: "#ffb5b5", r: 0.84, z: 5 },
  C:  { c: "#222222", r: 0.76, z: 6 },
  N:  { c: "#3050f8", r: 0.71, z: 7 },
  O:  { c: "#ff2222", r: 0.66, z: 8 },
  F:  { c: "#9bd35e", r: 0.57, z: 9 },
  P:  { c: "#ff8000", r: 1.07, z: 15 },
  S:  { c: "#ffdc00", r: 1.05, z: 16 },
  Cl: { c: "#1ff01f", r: 1.02, z: 17 },
  Br: { c: "#a62929", r: 1.20, z: 35 },
  I:  { c: "#940094", r: 1.39, z: 53 },
};
const FRAG_COLORS = ["#4ea1ff","#f0b94c","#a37bff","#5ed27a","#ef5b5b","#ff9ec4","#7feaff"];
const EDITOR_PALETTE = FRAG_COLORS;

let DATA = null;
let SELECTED = null;
let viewer = null;

// Editor state (per selected reaction)
const editor = {
  active: false,
  fragments: [],   // [{atom_indices: [...], multiplicity: 1}, ...]
  currentFrag: 0,
  status: "",
  statusClass: "",
};

async function init() {
  const resp = await fetch("data.json", {cache: "no-cache"});
  DATA = await resp.json();
  populateFilters();
  renderStats();
  renderList();
}

function isImproved(r) {
  return r.new && r.new.verdict && r.new.verdict !== "FAIL"
    && r.orig.derived.verdict === "FAIL";
}
function isUnfixable(r) { return !r.alt_available; }
function isStillFail(r) {
  return r.new && r.new.verdict === "FAIL";
}

function renderStats() {
  document.getElementById("s-total").textContent = DATA.n_total;
  document.getElementById("s-alt").textContent = DATA.reactions.filter(r => r.alt_available).length;
  document.getElementById("s-done").textContent = DATA.reactions.filter(r => r.new).length;
  document.getElementById("s-improved").textContent = DATA.reactions.filter(isImproved).length;
  document.getElementById("s-unfix").textContent = DATA.reactions.filter(isUnfixable).length;
  document.getElementById("s-stillfail").textContent = DATA.reactions.filter(isStillFail).length;
}

function populateFilters() {
  const pats = new Set(DATA.reactions.map(r => r.pattern));
  const sel = document.getElementById("filter-pattern");
  [...pats].sort().forEach(p => {
    const opt = document.createElement("option");
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  ["search","filter-family","filter-pattern","filter-status","filter-failcat"].forEach(id =>
    document.getElementById(id).addEventListener("input", renderList));
}

function renderList() {
  const q = document.getElementById("search").value.toLowerCase();
  const fam = document.getElementById("filter-family").value;
  const pat = document.getElementById("filter-pattern").value;
  const st = document.getElementById("filter-status").value;
  const fcat = document.getElementById("filter-failcat").value;
  const list = document.getElementById("list");
  list.innerHTML = "";
  const sortKey = r => {
    // Still-FAIL first (so user can see what still needs work), then improved
    let k = 5;
    if (isStillFail(r)) k = 0;
    else if (isImproved(r)) k = 1;
    else if (r.alt_available && r.new) k = 2;
    else if (r.alt_available) k = 3;
    else k = 4;
    return [k, -(r.new ? r.new.max_abs_res_cons : 0), r.rid];
  };
  const rows = DATA.reactions
    .filter(r => !q || r.rid.toLowerCase().includes(q))
    .filter(r => !fam || r.family === fam)
    .filter(r => !pat || r.pattern === pat)
    .filter(r => {
      if (!st) return true;
      if (st === "stillfail") return isStillFail(r);
      if (st === "alt") return r.alt_available;
      if (st === "done") return r.new != null;
      if (st === "improved") return isImproved(r);
      if (st === "unfix") return isUnfixable(r);
      return true;
    })
    .filter(r => !fcat || r.still_fail_category === fcat)
    .sort((a, b) => {
      const ka = sortKey(a), kb = sortKey(b);
      for (let i = 0; i < ka.length; i++) {
        if (ka[i] < kb[i]) return -1;
        if (ka[i] > kb[i]) return 1;
      }
      return 0;
    });
  for (const r of rows) {
    const div = document.createElement("div");
    div.className = "row" + (SELECTED && SELECTED.rid === r.rid ? " selected" : "");
    const altBadge = r.alt_available
      ? '<span class="badge fixable">alt</span>'
      : '<span class="badge intrinsic">intrinsic</span>';
    const stillFailBadge = isStillFail(r)
      ? '<span class="badge stillfail">★ STILL FAIL</span>' : "";
    const improvedBadge = isImproved(r)
      ? '<span class="badge improved">improved</span>'
      : (r.alt_available && !r.new
          ? '<span class="badge pending">pending</span>' : "");
    const failCatBadge = (isStillFail(r) && r.still_fail_category)
      ? `<span class="badge failcat">${r.still_fail_category}</span>` : "";
    const famBadge = `<span class="badge ${r.family.toLowerCase()}">${r.family}</span>`;
    const patBadge = `<span class="badge pattern">${r.pattern.replace("_ALT_KEPTBOND","")}</span>`;
    const resOld = r.orig.derived.max_abs_res_cons;
    const resNew = r.new ? r.new.max_abs_res_cons : null;
    div.innerHTML = `
      <div class="top">
        <span class="rid">${r.rid}</span>
        ${stillFailBadge}${famBadge}${patBadge}${altBadge}${improvedBadge}${failCatBadge}
      </div>
      <div class="stats">
        <span>n=<b>${r.n_atoms}</b></span>
        <span>dE_act <b>${FMT(r.orig.derived.dE_act, 2)}</b></span>
        <span class="res-old">old <b>${FMT(resOld, 2)}</b></span>
        ${resNew != null ? `<span class="res-new ${resNew > 0.5 ? 'neg' : ''}">new <b>${FMT(resNew, 2)}</b></span>` : ""}
        ${r.still_fail_detail ? `<span style="color: var(--bad); font-family: monospace; font-size: 10px">${r.still_fail_detail.slice(0,40)}</span>` : ""}
      </div>`;
    div.addEventListener("click", () => { SELECTED = r; renderList(); renderDetail(); });
    list.appendChild(div);
  }
}

// ─── 3D Viewer ──────────────────────────────────────────────────────────
class Viewer3D {
  constructor(canvas, hoverEl) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.hoverEl = hoverEl;
    this.dpr = window.devicePixelRatio || 1;
    // Rotation: keep two angles for yaw/pitch (trackball-lite).
    this.yaw = 0; this.pitch = 0;
    // Auto-rotate
    this.autoRotate = false;
    // View
    this.zoom = 1.0;
    this.pan = [0, 0];
    // Render state
    this.state = null;
    this.hoveredAtom = -1;
    this.highlightedFrag = -1;
    // Animation
    this.anim = { playing: false, t: 0, frames: ["R","TS","P"], idx: 1 };
    // Display options
    this.show = {
      labels: false, hydrogens: true,
      fragmentOutline: true, fragmentSet: "orig",
      bondChanges: true,
      geometry: "TS",
    };
    this._initEvents();
    this._tick();
  }

  setReaction(r) {
    this.reaction = r;
    if (r) {
      this.state = this._buildState(r);
      this._autocenter();
    } else {
      this.state = null;
    }
  }

  _buildState(r) {
    const symbols = r.symbols || [];
    let fragments;
    if (editor.active) {
      fragments = editor.fragments.map((f, i) => ({
        role: f.role || `comp_${i}`,
        atom_indices: f.atom_indices.slice(),
        multiplicity: f.multiplicity,
      }));
    } else if (this.show.fragmentSet === "alt" && r.alt_available) {
      fragments = r.alt.fragments;
    } else {
      fragments = r.orig.fragments;
    }
    const bondsR = new Set(r.bonds.R.map(e => e.slice().sort().join(",")));
    const bondsP = new Set(r.bonds.P.map(e => e.slice().sort().join(",")));
    const allBonds = new Set([...bondsR, ...bondsP]);
    const bondList = [...allBonds].map(s => {
      const [a, b] = s.split(",").map(Number);
      let kind = "kept";
      if (!bondsR.has(s)) kind = "formed";
      else if (!bondsP.has(s)) kind = "broken";
      return { a, b, kind };
    });
    return { symbols, fragments, bonds: bondList };
  }

  _autocenter() {
    const pos = this._currentPositions();
    if (!pos || !pos.length) return;
    let cx = 0, cy = 0, cz = 0, n = pos.length;
    for (const p of pos) { cx += p[0]; cy += p[1]; cz += p[2]; }
    cx /= n; cy /= n; cz /= n;
    this.center = [cx, cy, cz];
    // Compute radius
    let maxR = 0;
    for (const p of pos) {
      const d = Math.hypot(p[0]-cx, p[1]-cy, p[2]-cz);
      if (d > maxR) maxR = d;
    }
    this.boundR = Math.max(1, maxR);
  }

  _currentPositions() {
    if (!this.reaction) return null;
    if (this.anim.playing) {
      // Interpolate along R→TS→P based on this.anim.t (0..2)
      const t = this.anim.t;
      const a = Math.floor(t);
      const f = t - a;
      const aKey = this.anim.frames[Math.min(a, 2)];
      const bKey = this.anim.frames[Math.min(a + 1, 2)];
      const A = this.reaction[`positions_${aKey}`];
      const B = this.reaction[`positions_${bKey}`];
      if (!A || !B) return A || B || null;
      return A.map((p, i) => [
        p[0]*(1-f) + B[i][0]*f,
        p[1]*(1-f) + B[i][1]*f,
        p[2]*(1-f) + B[i][2]*f,
      ]);
    }
    return this.reaction[`positions_${this.show.geometry}`];
  }

  _initEvents() {
    const c = this.canvas;
    let lastX = 0, lastY = 0, down = false;
    let downX = 0, downY = 0, downBtn = 0;
    let dragged = false;
    c.addEventListener("contextmenu", e => e.preventDefault());
    c.addEventListener("mousedown", e => {
      down = true; lastX = e.clientX; lastY = e.clientY;
      downX = e.clientX; downY = e.clientY; downBtn = e.button;
      dragged = false;
      e.preventDefault();
    });
    c.addEventListener("mouseup", e => {
      down = false;
      // If barely moved, treat as click on an atom.
      if (!dragged) {
        const rect = c.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const idx = this._hitAtom(x, y);
        if (idx >= 0 && typeof this.onAtomClick === "function") {
          this.onAtomClick(idx, downBtn, e);
        }
      }
    });
    c.addEventListener("mouseleave", () => {
      down = false; this.hoveredAtom = -1; this.hoverEl.style.display = "none";
    });
    c.addEventListener("mousemove", e => {
      const rect = c.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      if (down) {
        if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 3) dragged = true;
        this.yaw += (e.clientX - lastX) * 0.01;
        this.pitch += (e.clientY - lastY) * 0.01;
        this.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.pitch));
        lastX = e.clientX; lastY = e.clientY;
        this.autoRotate = false;
      } else {
        // Hover detection
        const idx = this._hitAtom(x, y);
        this.hoveredAtom = idx;
        if (idx >= 0 && this.state) {
          this.hoverEl.style.display = "block";
          this.hoverEl.style.left = (x + 12) + "px";
          this.hoverEl.style.top = (y + 12) + "px";
          const sym = this.state.symbols[idx] || "?";
          const pos = this._currentPositions()?.[idx];
          const fi = this._fragmentOf(idx);
          const fragLabel = fi >= 0 ? `frag ${this.state.fragments[fi].role}` : "—";
          this.hoverEl.textContent = `${sym}${idx}  ·  ${fragLabel}` +
            (pos ? `  ·  [${pos.map(v => v.toFixed(2)).join(", ")}]` : "");
        } else {
          this.hoverEl.style.display = "none";
        }
      }
    });
    c.addEventListener("wheel", e => {
      e.preventDefault();
      const k = Math.exp(-e.deltaY * 0.001);
      this.zoom *= k;
      this.zoom = Math.max(0.3, Math.min(5, this.zoom));
    }, { passive: false });
  }

  _hitAtom(x, y) {
    if (!this.state) return -1;
    const pos = this._currentPositions();
    if (!pos) return -1;
    const rot = this._rotatePositions(pos);
    const { sx, sy, scale } = this._screenParams();
    let best = -1, bestD = Infinity;
    for (let i = 0; i < rot.length; i++) {
      const px = sx + rot[i][0] * scale, py = sy + rot[i][1] * scale;
      const elem = ELEM[this.state.symbols[i]] || { r: 0.7 };
      const r = elem.r * scale * 0.55;
      const d = Math.hypot(x - px, y - py);
      if (d < r && d < bestD) { best = i; bestD = d; }
    }
    return best;
  }

  _fragmentOf(idx) {
    if (!this.state) return -1;
    for (let i = 0; i < this.state.fragments.length; i++)
      if (this.state.fragments[i].atom_indices.includes(idx)) return i;
    return -1;
  }

  _rotatePositions(pos) {
    // Translate to centroid, rotate (yaw around Y, pitch around X).
    const [cx, cy, cz] = this.center;
    const cy_ = Math.cos(this.yaw), sy_ = Math.sin(this.yaw);
    const cp = Math.cos(this.pitch), sp = Math.sin(this.pitch);
    return pos.map(p => {
      let x = p[0] - cx, y = p[1] - cy, z = p[2] - cz;
      // Yaw (about Y)
      let x1 = x * cy_ + z * sy_;
      let z1 = -x * sy_ + z * cy_;
      // Pitch (about X)
      let y1 = y * cp - z1 * sp;
      let z2 = y * sp + z1 * cp;
      return [x1, y1, z2];
    });
  }

  _screenParams() {
    const w = this.canvas.width / this.dpr;
    const h = this.canvas.height / this.dpr;
    const fit = Math.min(w, h) * 0.4;
    const scale = (fit / this.boundR) * this.zoom;
    return {
      sx: w / 2 + this.pan[0],
      sy: h / 2 + this.pan[1],
      scale,
    };
  }

  _tick = () => {
    if (this.autoRotate) this.yaw += 0.006;
    if (this.anim.playing) {
      this.anim.t += 0.012;
      if (this.anim.t >= 2) this.anim.t = 0;
    }
    this._render();
    requestAnimationFrame(this._tick);
  };

  _render() {
    const ctx = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    ctx.fillStyle = "#060810";
    ctx.fillRect(0, 0, W, H);
    if (!this.state) return;
    const pos = this._currentPositions();
    if (!pos) return;
    const rot = this._rotatePositions(pos);
    const { sx, sy, scale } = this._screenParams();
    ctx.scale(this.dpr, this.dpr);

    // Project
    const proj = rot.map(p => ({
      x: sx + p[0] * scale, y: sy + p[1] * scale, z: p[2],
    }));

    // Build draw list: atoms + bonds, depth-sorted
    const items = [];
    for (let i = 0; i < proj.length; i++) {
      items.push({ kind: "atom", idx: i, z: proj[i].z });
    }
    for (const b of this.state.bonds) {
      const z = (proj[b.a].z + proj[b.b].z) / 2;
      items.push({ kind: "bond", b, z });
    }
    items.sort((u, v) => u.z - v.z);

    // Pass 1: fragment outlines (drawn behind atoms, so first)
    if (this.show.fragmentOutline) {
      for (let fi = 0; fi < this.state.fragments.length; fi++) {
        const col = FRAG_COLORS[fi % FRAG_COLORS.length];
        const muted = this.highlightedFrag >= 0 && this.highlightedFrag !== fi;
        for (const ai of this.state.fragments[fi].atom_indices) {
          const elem = ELEM[this.state.symbols[ai]] || { r: 0.7 };
          const r = elem.r * scale * 0.55;
          ctx.beginPath();
          ctx.arc(proj[ai].x, proj[ai].y, r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = col;
          ctx.globalAlpha = muted ? 0.10 : 0.5;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }

    // Per-atom display radius in screen px (ball-and-stick: ~0.40 of covalent r)
    const atomR = i => {
      const sym = this.state.symbols[i] || "?";
      const elem = ELEM[sym] || { r: 0.7 };
      return Math.max(4, elem.r * scale * 0.42);
    };

    // Pass 2: items by depth (bonds drawn before atoms at same depth → atoms on top)
    const STICK_W = Math.max(4, scale * 0.18);
    for (const it of items) {
      if (it.kind === "bond") {
        const a = it.b.a, b = it.b.b, kind = it.b.kind;
        const pa = proj[a], pb = proj[b];
        const symA = this.state.symbols[a], symB = this.state.symbols[b];
        const colA = (ELEM[symA] || {}).c || "#888";
        const colB = (ELEM[symB] || {}).c || "#888";
        // Don't draw bonds to hidden hydrogens
        const hiddenA = (symA === "H" && !this.show.hydrogens);
        const hiddenB = (symB === "H" && !this.show.hydrogens);
        if (hiddenA || hiddenB) continue;
        // Shorten bond endpoints to stop at atom radius (true ball-and-stick)
        const ra = atomR(a), rb = atomR(b);
        const dx = pb.x - pa.x, dy = pb.y - pa.y;
        const L = Math.hypot(dx, dy) || 1;
        const ux = dx / L, uy = dy / L;
        const sa = { x: pa.x + ux * ra * 0.78, y: pa.y + uy * ra * 0.78 };
        const sb = { x: pb.x - ux * rb * 0.78, y: pb.y - uy * rb * 0.78 };
        const mx = (sa.x + sb.x) / 2, my = (sa.y + sb.y) / 2;
        const depth = (pa.z + pb.z) / 2;
        const alpha = depthAlpha(depth, this.boundR);

        ctx.globalAlpha = alpha;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (kind !== "kept" && this.show.bondChanges) {
          // Highlight broken/formed bonds: thick dashed colored stick
          ctx.strokeStyle = (kind === "broken") ? "#ef5b5b" : "#5ed27a";
          ctx.lineWidth = STICK_W + 2;
          ctx.setLineDash([8, 5]);
          ctx.beginPath(); ctx.moveTo(sa.x, sa.y); ctx.lineTo(sb.x, sb.y); ctx.stroke();
          ctx.setLineDash([]);
        } else {
          // Two-tone solid stick, each half colored by its atom
          ctx.lineWidth = STICK_W;
          ctx.setLineDash([]);
          // Subtle dark outline for separation against atoms behind
          ctx.strokeStyle = "rgba(0,0,0,0.35)";
          ctx.lineWidth = STICK_W + 1.5;
          ctx.beginPath(); ctx.moveTo(sa.x, sa.y); ctx.lineTo(sb.x, sb.y); ctx.stroke();
          // Half A
          ctx.lineWidth = STICK_W;
          ctx.strokeStyle = darken(colA, 0.1);
          ctx.beginPath(); ctx.moveTo(sa.x, sa.y); ctx.lineTo(mx, my); ctx.stroke();
          // Half B
          ctx.strokeStyle = darken(colB, 0.1);
          ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(sb.x, sb.y); ctx.stroke();
          // Specular highlight: a thinner lighter line offset
          ctx.lineWidth = Math.max(1, STICK_W * 0.25);
          ctx.strokeStyle = "rgba(255,255,255,0.32)";
          const nx = -uy, ny = ux;
          const off = STICK_W * 0.22;
          ctx.beginPath();
          ctx.moveTo(sa.x + nx * off, sa.y + ny * off);
          ctx.lineTo(sb.x + nx * off, sb.y + ny * off);
          ctx.stroke();
        }
      } else if (it.kind === "atom") {
        const i = it.idx;
        const sym = this.state.symbols[i] || "?";
        if (sym === "H" && !this.show.hydrogens) continue;
        const elem = ELEM[sym] || { c: "#888", r: 0.7 };
        const r = atomR(i);
        const p = proj[i];
        const alpha = depthAlpha(p.z, this.boundR);
        ctx.globalAlpha = alpha;
        ctx.setLineDash([]);
        // Dark outline (depth separator)
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath(); ctx.arc(p.x, p.y, r + 1.5, 0, Math.PI*2); ctx.fill();
        // 3D-shaded sphere
        const grd = ctx.createRadialGradient(
          p.x - r*0.42, p.y - r*0.42, r*0.05,
          p.x, p.y, r);
        grd.addColorStop(0.0, lighten(elem.c, 0.55));
        grd.addColorStop(0.45, lighten(elem.c, 0.10));
        grd.addColorStop(1.0, darken(elem.c, 0.45));
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
        // Tiny specular dot
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.beginPath();
        ctx.arc(p.x - r*0.35, p.y - r*0.4, r*0.18, 0, Math.PI*2);
        ctx.fill();
        // Hover ring (white)
        if (this.hoveredAtom === i) {
          ctx.globalAlpha = 1;
          ctx.lineWidth = 2.5; ctx.strokeStyle = "#fff";
          ctx.beginPath(); ctx.arc(p.x, p.y, r + 3, 0, Math.PI*2); ctx.stroke();
        }
        // Migrating-atom marker (gold ring)
        if (this.reaction && this.reaction.migrating_atoms &&
            this.reaction.migrating_atoms.indexOf(i) >= 0) {
          ctx.globalAlpha = 1;
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#f0b94c";
          ctx.beginPath(); ctx.arc(p.x, p.y, r + 5, 0, Math.PI*2); ctx.stroke();
        }
        // Label (atom symbol + index) — always visible in edit mode
        if (this.show.labels || editor.active) {
          ctx.globalAlpha = 1;
          const labelText = sym + i;
          const fontSize = Math.max(10, r * 1.0);
          ctx.font = "bold " + fontSize + "px monospace";
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          // Outline + fill so label is readable on any sphere color
          ctx.lineWidth = Math.max(2.5, fontSize * 0.25);
          ctx.strokeStyle = "rgba(0,0,0,0.85)";
          ctx.lineJoin = "round";
          ctx.strokeText(labelText, p.x, p.y);
          ctx.fillStyle = "#fff";
          ctx.fillText(labelText, p.x, p.y);
        }
      }
    }
    ctx.globalAlpha = 1;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = Math.max(1, Math.floor(rect.width * this.dpr));
    this.canvas.height = Math.max(1, Math.floor(rect.height * this.dpr));
  }
}

function depthAlpha(z, R) {
  const t = (z + R) / (2 * R);
  return 0.55 + 0.45 * Math.max(0, Math.min(1, t));
}
function lighten(hex, amt) {
  const c = hexToRgb(hex);
  return `rgb(${Math.min(255, c.r + 255*amt)|0},${Math.min(255, c.g + 255*amt)|0},${Math.min(255, c.b + 255*amt)|0})`;
}
function darken(hex, amt) {
  const c = hexToRgb(hex);
  return `rgb(${Math.max(0, c.r - 255*amt)|0},${Math.max(0, c.g - 255*amt)|0},${Math.max(0, c.b - 255*amt)|0})`;
}
function hexToRgb(hex) {
  let h = hex.replace("#","");
  if (h.length === 3) h = h.split("").map(c => c+c).join("");
  const n = parseInt(h, 16);
  return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
}

function fragChips(fragments, viewer, key) {
  if (!fragments) return "";
  const out = fragments.map((f, i) => {
    const col = FRAG_COLORS[i % FRAG_COLORS.length];
    return `<span class="frag-chip" data-fi="${i}" data-key="${key}">
      <span class="dot" style="background:${col}"></span>
      ${f.role} <span style="color:var(--dim)">(n=${f.atom_indices.length}, m=${f.multiplicity})</span>
    </span>`;
  }).join("");
  return `<div class="frag-list">${out}</div>`;
}

          and can be re-run with one click — output lands in <code>Validate/refrag/results/&lt;rid&gt;.json</code>.
        </div>`}</div>
      <div id="ed-status" class="edit-status ${editor.statusClass}">${editor.status || ""}</div>
    </div>
  `;

  // Wire up the viewer
  const canvas = document.getElementById("mol-canvas");
  const hoverEl = document.getElementById("hover-info");
  if (viewer && viewer.canvas !== canvas) viewer = null;
  if (!viewer) viewer = new Viewer3D(canvas, hoverEl);
  viewer.setReaction(r);
  viewer.resize();

  // Geometry buttons
  document.querySelectorAll("#vc-geom .vc-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#vc-geom .vc-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      viewer.show.geometry = btn.dataset.v;
      viewer.anim.playing = false;
      document.getElementById("vc-anim").textContent = "▶ animate R→TS→P";
      document.getElementById("ov-geom").textContent = btn.dataset.v;
      viewer._autocenter();
    });
  });
  // Frag set buttons
  document.querySelectorAll("#vc-frag .vc-btn:not([disabled])").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#vc-frag .vc-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const v = btn.dataset.v;
      if (v === "none") { viewer.show.fragmentOutline = false; }
      else { viewer.show.fragmentOutline = true; viewer.show.fragmentSet = v; }
      viewer.state = viewer._buildState(r);
      document.getElementById("ov-frag").textContent = v;
    });
  });
  // Display toggles
  const tog = (id, key, label) => {
    const b = document.getElementById(id);
    if (!b) return;
    b.addEventListener("click", () => {
      viewer.show[key] = !viewer.show[key];
      b.classList.toggle("active", viewer.show[key]);
    });
  };
  tog("vc-labels", "labels");
  tog("vc-bonds", "bondChanges");
  tog("vc-Hs", "hydrogens");
  const spinBtn = document.getElementById("vc-spin");
  spinBtn.addEventListener("click", () => {
    viewer.autoRotate = !viewer.autoRotate;
    spinBtn.classList.toggle("active", viewer.autoRotate);
  });
  // Animation
  const animBtn = document.getElementById("vc-anim");
  animBtn.addEventListener("click", () => {
    viewer.anim.playing = !viewer.anim.playing;
    if (viewer.anim.playing) {
      viewer.anim.t = 0;
      animBtn.textContent = "❚❚ pause";
      document.querySelectorAll("#vc-geom .vc-btn").forEach(b => b.classList.remove("active"));
    } else {
      animBtn.textContent = "▶ animate R→TS→P";
      document.querySelectorAll("#vc-geom .vc-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.v === viewer.show.geometry));
    }
  });
  // Fragment chip highlight on hover
  document.querySelectorAll(".frag-chip").forEach(chip => {
    chip.addEventListener("mouseenter", () => {
      viewer.highlightedFrag = parseInt(chip.dataset.fi);
    });
    chip.addEventListener("mouseleave", () => { viewer.highlightedFrag = -1; });
  });
  // Resize observer
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => { viewer.resize(); viewer._autocenter(); });
    ro.observe(document.querySelector(".viewer-canvas-wrap"));
  }

  // ── Editor wiring ───────────────────────────────────────────────
  const edToggleBtn = document.getElementById("ed-toggle");
  if (edToggleBtn) edToggleBtn.addEventListener("click", () => {
    if (!editor.active) {
      seedEditor(r, "orig");
      editor.active = true;
    } else {
      editor.active = false;
      editor.status = "";
    }
    viewer.state = viewer._buildState(r);
    renderDetail();
  });

  if (!editor.active) {
    viewer.onAtomClick = null;
    return;
  }

  // Atom click = assign to current frag; right-click = unassign
  viewer.onAtomClick = (idx, button) => {
    if (button === 2) {
      // Right click: remove from any fragment
      for (const f of editor.fragments) {
        const k = f.atom_indices.indexOf(idx);
        if (k >= 0) f.atom_indices.splice(k, 1);
      }
    } else {
      // Left click: assign to current fragment
      // First remove from any other fragment
      for (const f of editor.fragments) {
        const k = f.atom_indices.indexOf(idx);
        if (k >= 0) f.atom_indices.splice(k, 1);
      }
      const cur = editor.fragments[editor.currentFrag];
      if (cur) cur.atom_indices.push(idx);
    }
    viewer.state = viewer._buildState(r);
    // In-place update keeps input focus / typed text intact.
    refreshEditorBodyInPlace(r);
  };

  document.getElementById("ed-seed-orig").addEventListener("click", () => {
    seedEditor(r, "orig"); viewer.state = viewer._buildState(r); refreshEditorBody(r);
  });
  const seedAlt = document.getElementById("ed-seed-alt");
  if (seedAlt && !seedAlt.disabled) seedAlt.addEventListener("click", () => {
    seedEditor(r, "alt"); viewer.state = viewer._buildState(r); refreshEditorBody(r);
  });
  document.getElementById("ed-add").addEventListener("click", () => {
    editor.fragments.push({ role: `comp_${editor.fragments.length}`,
                             atom_indices: [], multiplicity: 1 });
    editor.currentFrag = editor.fragments.length - 1;
    viewer.state = viewer._buildState(r); refreshEditorBody(r);
  });
  document.getElementById("ed-clear").addEventListener("click", () => {
    for (const f of editor.fragments) f.atom_indices = [];
    viewer.state = viewer._buildState(r); refreshEditorBody(r);
  });
  document.getElementById("ed-auto").addEventListener("click", () => {
    autoMultiplicity(r);
    refreshEditorBody(r);
  });
  document.getElementById("ed-save").addEventListener("click", () => saveEditor(r));
  document.getElementById("ed-rerun").addEventListener("click", () => rerunEditor(r));

  bindEditorBodyControls(r);
  if (editor.active && editor.fragments.length) pollRerunStatus(r.rid);
}

function seedEditor(r, src) {
  let fragsSrc;
  if (src === "alt" && r.alt_available) fragsSrc = r.alt.fragments;
  else fragsSrc = r.orig.fragments;
  editor.fragments = fragsSrc.map((f, i) => ({
    role: f.role || `comp_${i}`,
    atom_indices: f.atom_indices.slice(),
    multiplicity: f.multiplicity || 1,
  }));
  if (editor.fragments.length < 2)
    editor.fragments.push({ role: `comp_${editor.fragments.length}`,
                            atom_indices: [], multiplicity: 1 });
  editor.currentFrag = 0;
  editor.status = `seeded from ${src}`;
  editor.statusClass = "";
}

function electronCount(atomIndices, symbols) {
  let n = 0;
  for (const i of atomIndices) {
    const z = (ELEM[symbols[i]] || {}).z || 0;
    n += z;
  }
  return n;
}

function autoMultiplicity(r) {
  for (const f of editor.fragments) {
    const ne = electronCount(f.atom_indices, r.symbols);
    f.multiplicity = (ne % 2 === 0) ? 1 : 2;
  }
  editor.status = "set multiplicities from electron parity";
  editor.statusClass = "";
}

function editorBodyHtml(r) {
  const n = r.n_atoms;
  const assigned = new Set();
  editor.fragments.forEach(f => f.atom_indices.forEach(i => assigned.add(i)));
  const unassigned = [];
  for (let i = 0; i < n; i++) if (!assigned.has(i)) unassigned.push(i);

  const totalE = editor.fragments.reduce((s, f) => s + electronCount(f.atom_indices, r.symbols), 0);
  const totalMult = (totalE % 2 === 0) ? "even (singlet/triplet ok)" : "odd (doublet ok)";

  const rowsHtml = editor.fragments.map((f, i) => {
    const col = EDITOR_PALETTE[i % EDITOR_PALETTE.length];
    const ne = electronCount(f.atom_indices, r.symbols);
    const parityWarn = ((ne + f.multiplicity - 1) % 2) !== 0;
    const expected = (ne % 2 === 0) ? 1 : 2;
    return `<div class="edit-frag-row ${i === editor.currentFrag ? "active" : ""}
                                       ${f.atom_indices.length === 0 ? "unassigned" : ""}"
              data-fi="${i}">
      <span class="swatch" style="background:${col}"></span>
      <span class="atoms">
        <input type="text" class="ed-role" data-fi="${i}" value="${escapeAttr(f.role)}" style="width:88px">
        <span class="atoms-text">[${f.atom_indices.join(",")}] (n=${f.atom_indices.length}, e⁻=${ne})</span>
      </span>
      <select class="ed-mult" data-fi="${i}"
              style="${parityWarn ? "color:var(--bad);border-color:var(--bad)" : ""}">
        ${[1,2,3,4,5].map(m =>
          `<option value="${m}" ${f.multiplicity===m?"selected":""}>m=${m}${expected===m?" *":""}</option>`
        ).join("")}
      </select>
      <button class="vc-btn ed-del" data-fi="${i}" title="delete fragment">×</button>
    </div>`;
  }).join("");

  return `
    <div style="font-size: 11px; color: var(--dim); margin: 6px 0 4px 0;">
      Left-click an atom in the 3D viewer to assign it to the active fragment.
      Right-click to unassign. Active fragment is highlighted below.
    </div>
    <div class="edit-frag-rows">${rowsHtml}</div>
    <div id="ed-warn" class="edit-warnings"
         style="display:${unassigned.length ? "block" : "none"}">${
            unassigned.length ? "unassigned: [" + unassigned.join(",") + "]" : ""
         }</div>
    <div id="ed-totals" style="font-size: 11px; color: var(--dim); margin-top: 6px;">
      total electrons (Σ valence): ${totalE} (${totalMult})
    </div>`;
}

function escapeAttr(s) {
  return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

function refreshEditorBody(r) {
  const body = document.getElementById("ed-body");
  if (body) body.innerHTML = editorBodyHtml(r);
  bindEditorBodyControls(r);
  const stEl = document.getElementById("ed-status");
  if (stEl) {
    stEl.className = "edit-status " + (editor.statusClass || "");
    stEl.textContent = editor.status || "";
  }
}

// In-place: refresh only computed text (atom lists, electron counts, totals) +
// active-row CSS, without destroying inputs. Use after atom click on canvas.
function refreshEditorBodyInPlace(r) {
  let totalE = 0;
  const assigned = new Set();
  editor.fragments.forEach(f => f.atom_indices.forEach(i => assigned.add(i)));

  editor.fragments.forEach((f, i) => {
    const row = document.querySelector('.edit-frag-row[data-fi="' + i + '"]');
    if (!row) return;
    row.classList.toggle("active", i === editor.currentFrag);
    row.classList.toggle("unassigned", f.atom_indices.length === 0);
    const ne = electronCount(f.atom_indices, r.symbols);
    totalE += ne;
    const txt = row.querySelector('.atoms-text');
    if (txt) {
      txt.textContent = "[" + f.atom_indices.join(",") + "] (n=" +
        f.atom_indices.length + ", e⁻=" + ne + ")";
    }
    const sel = row.querySelector(".ed-mult");
    if (sel) {
      const parityBad = ((ne + f.multiplicity - 1) % 2) !== 0;
      sel.style.color = parityBad ? "var(--bad)" : "";
      sel.style.borderColor = parityBad ? "var(--bad)" : "";
    }
  });

  const n = r.n_atoms;
  const unassigned = [];
  for (let i = 0; i < n; i++) if (!assigned.has(i)) unassigned.push(i);
  const warn = document.getElementById("ed-warn");
  if (warn) {
    warn.style.display = unassigned.length ? "block" : "none";
    warn.textContent = unassigned.length
      ? "unassigned: [" + unassigned.join(",") + "]"
      : "";
  }
  const tot = document.getElementById("ed-totals");
  if (tot) {
    const par = (totalE % 2 === 0) ? "even (singlet/triplet ok)" : "odd (doublet ok)";
    tot.textContent = "total electrons (Σ valence): " + totalE + " (" + par + ")";
  }
}

function bindEditorBodyControls(r) {
  const body = document.getElementById("ed-body");
  if (!body || body.dataset.bound === "1") return;
  body.dataset.bound = "1";

  // Event delegation: handlers attach to the stable wrapper, not the children.
  body.addEventListener("click", e => {
    const del = e.target.closest(".ed-del");
    if (del) {
      const fi = parseInt(del.dataset.fi);
      editor.fragments.splice(fi, 1);
      if (editor.fragments.length === 0)
        editor.fragments.push({ role: "comp_0", atom_indices: [], multiplicity: 1 });
      editor.currentFrag = Math.min(editor.currentFrag, editor.fragments.length - 1);
      viewer.state = viewer._buildState(r);
      refreshEditorBody(r);
      return;
    }
    const row = e.target.closest(".edit-frag-row");
    if (row) {
      // Don't hijack focus on form controls
      if (e.target.closest("input") || e.target.closest("select") ||
          e.target.closest("button")) return;
      editor.currentFrag = parseInt(row.dataset.fi);
      refreshEditorBodyInPlace(r);
    }
  });
  // Role text — live update on every keystroke, do NOT rebuild.
  body.addEventListener("input", e => {
    if (e.target.classList.contains("ed-role")) {
      editor.fragments[parseInt(e.target.dataset.fi)].role = e.target.value;
    }
  });
  // Multiplicity dropdown — update state + parity styling in place.
  body.addEventListener("change", e => {
    if (e.target.classList.contains("ed-mult")) {
      editor.fragments[parseInt(e.target.dataset.fi)].multiplicity =
        parseInt(e.target.value);
      refreshEditorBodyInPlace(r);
    }
  });
}

async function saveEditor(r) {
  const payload = {
    rid: r.rid,
    fragments: editor.fragments.filter(f => f.atom_indices.length > 0),
  };
  // Validation
  const assigned = new Set();
  for (const f of payload.fragments)
    for (const i of f.atom_indices) assigned.add(i);
  if (assigned.size < r.n_atoms) {
    editor.status = `cannot save: ${r.n_atoms - assigned.size} atoms unassigned`;
    editor.statusClass = "err";
    refreshEditorBody(r);
    return;
  }
  if (payload.fragments.length < 2) {
    editor.status = "cannot save: need at least 2 non-empty fragments";
    editor.statusClass = "err";
    refreshEditorBody(r);
    return;
  }
  const res = await fetch("/api/fragmentation", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const j = await res.json();
  if (j.ok) {
    editor.status = `saved: ${j.n_fragments} frag · coupling=${j.coupling} · total_spin=${j.total_spin}\n→ ${j.saved_to}`;
    editor.statusClass = "ok";
  } else {
    editor.status = `save failed: ${j.error}`;
    editor.statusClass = "err";
  }
  refreshEditorBody(r);
}

async function rerunEditor(r) {
  const res = await fetch("/api/rerun", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ rid: r.rid }),
  });
  const j = await res.json();
  if (j.ok) {
    editor.status = `rerun started (pid ${j.pid}) at ${j.started}\nADF takes ~30–50 min — page will update when done.`;
    editor.statusClass = "";
  } else {
    editor.status = `rerun not started: ${j.error}`;
    editor.statusClass = "err";
  }
  refreshEditorBody(r);
  pollRerunStatus(r.rid);
}

const RERUN_POLLS = {};
function pollRerunStatus(rid) {
  if (RERUN_POLLS[rid]) clearTimeout(RERUN_POLLS[rid]);
  const tick = async () => {
    try {
      const s = await fetch(`/api/rerun_status/${rid}`).then(x => x.json());
      if (!SELECTED || SELECTED.rid !== rid) return;
      const stEl = document.getElementById("ed-status");
      if (s.status === "running") {
        if (stEl) {
          stEl.className = "edit-status";
          stEl.textContent = `rerun running (pid ${s.pid}, started ${s.started})\n${s.log_tail || ""}`;
        }
        RERUN_POLLS[rid] = setTimeout(tick, 8000);
      } else if (s.status === "done") {
        // Refresh full data so the conservation row updates
        const d = await fetch("data.json?_=" + Date.now()).then(x => x.json());
        DATA = d;
        renderStats();
        renderList();
        const refreshed = DATA.reactions.find(x => x.rid === rid);
        if (refreshed) SELECTED = refreshed;
        editor.status = `rerun complete at ${s.mtime}`;
        editor.statusClass = "ok";
        renderDetail();
      }
    } catch (e) {}
  };
  tick();
}

init();
// Auto-refresh data every 30s so reruns flow into the page without reload.
setInterval(async () => {
  try {
    const r = await fetch("data.json?_=" + Date.now());
    const d = await r.json();
    DATA = d;
    renderStats();
    renderList();
    if (SELECTED) {
      const refreshed = DATA.reactions.find(x => x.rid === SELECTED.rid);
      if (refreshed) {
        const had = JSON.stringify(SELECTED.new || null);
        const now = JSON.stringify(refreshed.new || null);
        SELECTED = refreshed;
        if (had !== now) renderDetail();
      }
    }
  } catch (e) {}
}, 30000);
</script>
</body>
</html>
